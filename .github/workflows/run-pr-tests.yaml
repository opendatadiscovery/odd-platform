name: Run tests
on:
  workflow_dispatch:
  pull_request:
    types: ['opened', 'reopened', 'synchronize']
  push:
    branches:
      - 'debug/**'

permissions:
  checks: write
  pull-requests: write

concurrency:
  group: pr-cg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_playwright_tests:
    uses: ./.github/workflows/run-playwright-tests.yml
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Cache local Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache local npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and run tests
        env:
          GENERATE_SOURCEMAP: false
          CI: false
        run: ./gradlew odd-platform-api:build ${{ github.event.inputs.buildOptions }} --no-daemon --scan -PbundleUI=false

      - name: Publish test reports
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: always()
        with:
          files: 'odd-platform-api/build/test-results/**/*.xml'
          check_name: Test Results
          comment_mode: create new

      # Deterministic coverage gate + PR comment. Reads the JaCoCo XML produced by
      # `odd-platform-api:build` (check.dependsOn jacocoTestReport). Generated code is
      # excluded in build.gradle, so these percentages are of hand-written code.
      # No external service / no extra secret — uses the default GITHUB_TOKEN.
      - name: Publish coverage report
        uses: Madrapps/jacoco-report@v1.8.0
        if: always()
        with:
          paths: odd-platform-api/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Coverage
          update-comment: true
          min-coverage-overall: 70
          min-coverage-changed-files: 98
